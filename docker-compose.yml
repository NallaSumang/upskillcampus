version: "3.9"

services:
  backend:
    build: ./backend
    container_name: factory-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./factory.db
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - backend-data:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factory-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  backend-data:
